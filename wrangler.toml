name = "docuhub"
main = "worker/index.ts"
compatibility_date = "2026-06-16"
compatibility_flags = ["nodejs_compat"]
# This is the critical part for custom domains:
[[routes]]
pattern = "avdpdocs.org"
custom_domain = true

[assets]
directory = "./public"  # or wherever your static files are
binding = "ASSETS"
# Without this, Cloudflare checks the Assets binding BEFORE running the
# Worker's own fetch() handler for any request that looks like a page
# navigation (Sec-Fetch-Dest: document/iframe/frame) -- e.g. the <iframe
# src="/api/documents/:id/preview"> the document preview modal uses. Since
# that path has no file extension and matches no literal asset,
# not_found_handling="spa" serves index.html directly from the Assets layer,
# and worker/index.ts's isApiPath() routing never runs at all (confirmed via
# Cf-Cache-Status: HIT on the preview response -- it never reached the
# Worker). Regular fetch()/XHR calls aren't navigations, so they were
# unaffected. run_worker_first forces every request through fetch() first,
# so isApiPath() always gets to make the /api/* vs static-asset decision.
run_worker_first = true

# Nightly external backup (see worker/index.ts's scheduled() handler and
# server/backup.ts). No-ops with a log line if IDRIVE_* secrets below aren't
# set -- safe to leave enabled even before the feature is configured.
[triggers]
crons = ["0 2 * * *"]

[vars]
NODE_ENV = "production"
# The project URL is public information (it's visible to every client);
# only the service-role key must stay a secret.
SUPABASE_URL = "https://vwpibqvwzvqccoqceumv.supabase.co"
# Admin-created accounts must use this domain; enforced in sanitizeUserPayload()
# in server.ts. Not a secret -- just a policy value.
ALLOWED_EMAIL_DOMAIN = "avdp.org.sl"

# `body-parser` pulls in iconv-lite, whose dynamic `require('streams')` breaks
# under the Workers nodejs_compat shim. Swap it for a TextDecoder-backed stub
# that handles the UTF-8 / Latin-1 charsets real clients actually send.
[alias]
"iconv-lite" = "./worker/iconv-lite-stub.js"

# Required secrets — set in the Cloudflare dashboard (Workers & Pages →
# docuhub → Settings → Variables and Secrets → Add → type "Secret") or with
# `wrangler secret put NAME`. NEVER commit secret values to this file: the
# repo is readable by anyone with repo access and git history is forever.
#   SUPABASE_SERVICE_ROLE_KEY    Supabase service-role key (durable persistence + storage)
#   INITIAL_ADMIN_PASSWORD       Optional — first-boot admin password (default ChangeMe!2026, change forced on first login)
#   SESSION_SECRET               Optional — overrides the cookie HMAC secret
#   RESEND_API_KEY               Optional — enables email notifications
#   GEMINI_API_KEY               Optional — AI OCR/tagging (falls back to heuristics)
#   IDRIVE_ACCESS_KEY_ID         Optional — enables external backups (Settings → Backup, + nightly cron)
#   IDRIVE_SECRET_ACCESS_KEY     Optional — pairs with the access key above
#   IDRIVE_ENDPOINT              Optional — e.g. https://<id>.idrivee2-<region>.com (S3-compatible; also works with Backblaze/Wasabi/R2/MinIO)
#   IDRIVE_BUCKET                Optional — destination bucket name
