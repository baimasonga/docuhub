name = "docuhub"
main = "worker/index.ts"
compatibility_date = "2026-06-16"

# Static SPA assets built by `npm run build` (vite -> dist-pages).
[assets]
directory = "./dist-pages"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
NODE_ENV = "production"
# Required for /api/* and /s/* proxying when deploying with `wrangler deploy`.
# Set this in the Cloudflare dashboard or uncomment for local testing.
# API_ORIGIN = "https://<your-node-api-host>"

# Required secrets for the separate Node API host (set on that host, not here):
#   SUPABASE_URL                 https://onqonmzzcgobvllkothg.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY    Supabase service-role key (durable persistence + storage)
#   SUPABASE_ANON_KEY             Supabase anon/public key (auth + OAuth handoff)
#   GEMINI_API_KEY               Optional — AI OCR/tagging (falls back to heuristics)
#   SESSION_SECRET               Optional — overrides the cookie HMAC secret
